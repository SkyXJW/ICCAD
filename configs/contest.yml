# 提交用配置（评测合规版）
# - 模型只允许 gpt-4o-mini / claude-haiku-4-5（官方 Q&A A4/A6.3），key 走环境变量
# - 不写死任何绝对路径：suite_root/log_dir 缺省 = 当前工作目录（评测工作目录 /app）
provider: openai
model: gpt-4o-mini
api_key: null            # export OPENAI_API_KEY=...（评测时官方替换为他们的 key）
parser: hybrid           # 已知句式走 regex（已验证），新句式 LLM 兜底
path_limit: 1000000
yosys_timeout: 240
temperature: 0
